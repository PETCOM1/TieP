<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
  </defs>
  <!-- Background Keycap Chassis -->
  <rect x="8" y="8" width="84" height="84" rx="22" fill="#070b13" stroke="url(#glowGrad)" stroke-width="6" />
  <!-- Tactile Keycap Face -->
  <rect x="16" y="16" width="68" height="60" rx="14" fill="#121826" stroke="#1f293d" stroke-width="2" />
  <!-- Logo Letter 'T' -->
  <text x="50" y="46" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="34" fill="url(#glowGrad)" text-anchor="middle" dominant-baseline="middle">T</text>
  <!-- Mechanical Switch Accent Point -->
  <circle cx="50" cy="62" r="3.5" fill="#a855f7" />
</svg>